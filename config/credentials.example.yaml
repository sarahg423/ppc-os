# Google Ads API Credentials
# Copy this file to credentials.yaml and fill in your values.
# credentials.yaml is gitignored — never commit real credentials.
#
# To obtain these credentials:
# 1. Create a Google Cloud project at https://console.cloud.google.com
# 2. Enable the Google Ads API
# 3. Create OAuth 2.0 credentials (Desktop app type)
# 4. Apply for a developer token at https://ads.google.com/aw/apicenter
# 5. Use the oauth2 refresh token flow to get a refresh token

google_ads:
  developer_token: "YOUR_DEVELOPER_TOKEN"
  client_id: "YOUR_CLIENT_ID.apps.googleusercontent.com"
  client_secret: "YOUR_CLIENT_SECRET"
  refresh_token: "YOUR_REFRESH_TOKEN"
  login_customer_id: ""  # Your account ID without hyphens (e.g. "1234567890")
